name: Deploy Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add Host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 185.193.66.70 >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh root@185.193.66.70 << 'EOF'
          cd /root/alb70bot

          echo "📥 Pull..."
          git pull

          echo "🐍 Checking Python..."
          python3 -m compileall .

          echo "🔄 Restart..."
          systemctl restart alb70bot

          sleep 3

          systemctl status alb70bot --no-pager
          EOF

      - name: Telegram Success
        if: success()
        run: |
          curl -s \
          -X POST \
          https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="✅ تم نشر البوت بنجاح%0Aالمستودع: ${{ github.repository }}%0Aالفرع: ${{ github.ref_name }}%0Aالمنفذ: ${{ github.actor }}"

      - name: Telegram Failed
        if: failure()
        run: |
          curl -s \
          -X POST \
          https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ فشل نشر البوت%0Aراجع GitHub Actions"
