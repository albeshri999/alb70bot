- name: Telegram Success
  if: success()
  run: |
    MESSAGE="✅ تم نشر البوت بنجاح

📦 المستودع:
${{ github.repository }}

🌿 الفرع:
${{ github.ref_name }}

👤 المنفذ:
${{ github.actor }}

📝 Commit:
${{ github.sha }}"

    curl -s -X POST \
      "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
      -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
      --data-urlencode text="$MESSAGE"
