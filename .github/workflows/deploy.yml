name: Deploy Bot

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add Server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 185.193.66.70 >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh root@185.193.66.70 << 'EOF'

          set -e

          echo "📦 Creating backup..."
          mkdir -p /root/backups
          tar -czf /root/backups/alb70bot-$(date +%Y%m%d-%H%M%S).tar.gz /root/alb70bot

          echo "📂 Enter project..."
          cd /root/alb70bot

          echo "⬇️ Pull latest code..."
          git pull origin main

          echo "🐍 Activate virtual environment..."
          source venv/bin/activate

          echo "📦 Install dependencies..."
          pip install -r requirements.txt

          echo "🧪 Check Python syntax..."
          python3 -m compileall .

          echo "🔄 Restart service..."
          systemctl restart alb70bot

          echo "⏳ Waiting..."
          sleep 3

          echo "📋 Service status..."
          systemctl --no-pager --full status alb70bot

          echo "✅ Deployment completed."

          EOF

      - name: Telegram Success
        if: success()
        run: |
          curl -s \
            -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=✅ تم نشر البوت بنجاح

📦 المستودع: ${{ github.repository }}

🌿 الفرع: ${{ github.ref_name }}

👤 المنفذ: ${{ github.actor }}

📝 Commit:
${{ github.sha }}"

      - name: Telegram Failed
        if: failure()
        run: |
          curl -s \
            -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=❌ فشل نشر البوت

📦 المستودع: ${{ github.repository }}

🌿 الفرع: ${{ github.ref_name }}

👤 المنفذ: ${{ github.actor }}

📝 Commit:
${{ github.sha }}"
